name: Release Marketplace ZIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Package marketplace ZIP
        run: ./scripts/package.sh ios-claude-plugins.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ios-claude-plugins.zip
          generate_release_notes: true
